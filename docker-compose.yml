services:
  api:
    build: .
    container_name: document-intelligence-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - jaeger
    volumes:
      - .:/app          # mount entire project root, not just src
    
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"