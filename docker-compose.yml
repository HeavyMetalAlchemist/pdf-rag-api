services:
  pdf-rag-api:
    build: .
    container_name: pdf-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - jaeger
    volumes:
      - .:/app
    
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"